<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catch Image</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #080810;
  --surface: #10101c;
  --surface2: #18182a;
  --border: rgba(255,255,255,0.06);
  --accent: #e8ff47;
  --text: #f0f0ff;
  --muted: #6b6b88;
  --radius: 12px;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans KR', sans-serif;
  min-height: 100vh;
}

/* HEADER */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 1.2rem 2.5rem;
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  background: rgba(8,8,16,0.94);
  backdrop-filter: blur(14px);
  z-index: 100;
}

.logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.9rem;
  letter-spacing: 4px;
  color: var(--accent);
  line-height: 1;
  cursor: pointer;
}

.header-search {
  display: flex;
  gap: 8px;
  flex: 1;
  max-width: 460px;
  margin: 0 2rem;
}

.header-search input {
  flex: 1;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 16px;
  color: var(--text);
  font-size: 0.88rem;
  font-family: 'Noto Sans KR', sans-serif;
  outline: none;
  transition: border-color 0.2s;
}
.header-search input:focus { border-color: var(--accent); }
.header-search input::placeholder { color: var(--muted); }

.header-search button {
  background: var(--accent);
  border: none;
  color: #080810;
  padding: 8px 20px;
  border-radius: 8px;
  font-weight: 700;
  font-size: 0.85rem;
  cursor: pointer;
  font-family: 'Noto Sans KR', sans-serif;
  transition: opacity 0.15s;
}
.header-search button:hover { opacity: 0.85; }

.source-toggle {
  display: flex;
  gap: 6px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 4px;
}
.src-btn {
  padding: 5px 12px;
  border-radius: 6px;
  border: none;
  font-size: 0.75rem;
  font-family: 'Noto Sans KR', sans-serif;
  cursor: pointer;
  background: none;
  color: var(--muted);
  transition: all 0.15s;
  white-space: nowrap;
}
.src-btn.active { background: var(--accent); color: #080810; font-weight: 700; }

/* HERO */
.hero {
  text-align: center;
  padding: 4rem 2rem 2.5rem;
  position: relative;
  overflow: hidden;
}
.hero::before {
  content: '';
  position: absolute;
  top: -80px; left: 50%;
  transform: translateX(-50%);
  width: 700px; height: 350px;
  background: radial-gradient(ellipse, rgba(232,255,71,0.07) 0%, transparent 70%);
  pointer-events: none;
}
.hero h1 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(3.5rem, 9vw, 6.5rem);
  letter-spacing: 8px;
  line-height: 0.95;
  color: var(--text);
}
.hero h1 span { color: var(--accent); }
.hero p {
  color: var(--muted);
  margin-top: 1rem;
  font-size: 0.88rem;
  letter-spacing: 0.06em;
}
.hero-search {
  display: flex;
  gap: 10px;
  max-width: 560px;
  margin: 2rem auto 0;
  background: var(--surface);
  border: 1px solid rgba(232,255,71,0.18);
  border-radius: 14px;
  padding: 8px 8px 8px 22px;
}
.hero-search input {
  flex: 1;
  background: none;
  border: none;
  outline: none;
  color: var(--text);
  font-size: 1rem;
  font-family: 'Noto Sans KR', sans-serif;
}
.hero-search input::placeholder { color: var(--muted); }
.hero-search button {
  background: var(--accent);
  border: none;
  color: #080810;
  padding: 10px 26px;
  border-radius: 10px;
  font-weight: 700;
  font-size: 0.95rem;
  font-family: 'Noto Sans KR', sans-serif;
  cursor: pointer;
  transition: opacity 0.15s, transform 0.1s;
}
.hero-search button:hover { opacity: 0.88; }
.hero-search button:active { transform: scale(0.97); }

.tags {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: center;
  max-width: 720px;
  margin: 1.5rem auto 0;
  padding: 0 1rem;
}
.tag {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--muted);
  padding: 6px 16px;
  border-radius: 999px;
  font-size: 0.78rem;
  cursor: pointer;
  transition: all 0.15s;
  user-select: none;
}
.tag:hover { border-color: var(--accent); color: var(--accent); }

/* GALLERY */
.gallery-section {
  max-width: 1300px;
  margin: 3rem auto 0;
  padding: 0 2rem;
}
.gallery-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 1.2rem;
  flex-wrap: wrap;
  gap: 10px;
}
.gallery-title-text {
  font-size: 0.68rem;
  letter-spacing: 0.18em;
  color: var(--muted);
  text-transform: uppercase;
}
.gallery-controls select {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 5px 10px;
  border-radius: 7px;
  font-size: 0.8rem;
  cursor: pointer;
  outline: none;
}

.gallery {
  columns: 4;
  column-gap: 14px;
}
@media (max-width: 1100px) { .gallery { columns: 3; } }
@media (max-width: 720px)  { .gallery { columns: 2; } }
@media (max-width: 500px)  {
  .gallery { columns: 1; }
  header { padding: 1rem; }
  .header-search { display: none; }
  .source-toggle { display: none; }
}

.photo-card {
  break-inside: avoid;
  margin-bottom: 14px;
  border-radius: var(--radius);
  overflow: hidden;
  position: relative;
  background: var(--surface);
}
.photo-card img {
  width: 100%;
  display: block;
  transition: transform 0.35s ease;
  cursor: pointer;
}
.photo-card:hover img { transform: scale(1.05); }

.photo-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(to top, rgba(8,8,16,0.92) 0%, transparent 55%);
  opacity: 0;
  transition: opacity 0.25s;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  padding: 14px;
  pointer-events: none;
}
.photo-card:hover .photo-overlay { opacity: 1; pointer-events: all; }

.photographer {
  font-size: 0.73rem;
  color: rgba(255,255,255,0.6);
  margin-bottom: 8px;
}
.overlay-btns { display: flex; gap: 8px; }
.view-btn, .dl-btn {
  padding: 6px 13px;
  border-radius: 7px;
  font-size: 0.73rem;
  font-weight: 700;
  text-decoration: none;
  cursor: pointer;
  border: none;
  font-family: 'Noto Sans KR', sans-serif;
  transition: opacity 0.15s;
}
.view-btn { background: rgba(255,255,255,0.15); color: #fff; border: 1px solid rgba(255,255,255,0.3); }
.dl-btn   { background: var(--accent); color: #080810; }
.view-btn:hover, .dl-btn:hover { opacity: 0.85; }

.source-badge {
  position: absolute;
  top: 8px; right: 8px;
  font-size: 0.6rem;
  font-weight: 700;
  letter-spacing: 0.05em;
  padding: 3px 7px;
  border-radius: 4px;
  opacity: 0;
  transition: opacity 0.25s;
}
.photo-card:hover .source-badge { opacity: 1; }
.badge-pexels  { background: #05a081; color: #fff; }
.badge-pixabay { background: #1e6d9c; color: #fff; }

/* STATUS */
.status {
  text-align: center;
  padding: 4rem 1rem;
  color: var(--muted);
  font-size: 0.9rem;
}
.status.error { color: #ff6b6b; }
.spinner {
  width: 34px; height: 34px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  margin: 3rem auto;
}
@keyframes spin { to { transform: rotate(360deg); } }

.load-more {
  display: flex;
  justify-content: center;
  padding: 2.5rem 0 6rem;
}
.load-more button {
  background: transparent;
  border: 1px solid rgba(232,255,71,0.4);
  color: var(--accent);
  padding: 0.75rem 3.5rem;
  border-radius: var(--radius);
  cursor: pointer;
  font-size: 0.88rem;
  font-family: 'Noto Sans KR', sans-serif;
  font-weight: 500;
  transition: background 0.15s;
}
.load-more button:hover { background: rgba(232,255,71,0.07); }

/* LIGHTBOX */
.lightbox {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.95);
  z-index: 999;
  align-items: center;
  justify-content: center;
  padding: 1.5rem;
  flex-direction: column;
  gap: 1rem;
}
.lightbox.open { display: flex; }
.lightbox img {
  max-width: 90vw;
  max-height: 80vh;
  border-radius: var(--radius);
  object-fit: contain;
}
.lb-close {
  position: fixed;
  top: 1rem; right: 1.5rem;
  background: none;
  border: none;
  color: #fff;
  font-size: 2.2rem;
  cursor: pointer;
  opacity: 0.55;
  line-height: 1;
}
.lb-close:hover { opacity: 1; }
.lb-dl {
  background: var(--accent);
  color: #080810;
  border: none;
  padding: 10px 28px;
  border-radius: 10px;
  font-weight: 700;
  font-size: 0.9rem;
  font-family: 'Noto Sans KR', sans-serif;
  cursor: pointer;
  text-decoration: none;
  transition: opacity 0.15s;
}
.lb-dl:hover { opacity: 0.85; }

/* ── 광고 영상: 좌측 하단 고정 ── */
#ad-widget {
  position: fixed;
  bottom: 20px;
  left: 20px;
  width: 260px;
  z-index: 200;
  border-radius: var(--radius);
  overflow: visible;
  filter: drop-shadow(0 8px 32px rgba(0,0,0,0.7));
}

#ad-widget .ad-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: #0e0e1e;
  border: 1px solid var(--border);
  border-bottom: none;
  border-radius: var(--radius) var(--radius) 0 0;
  padding: 5px 10px;
}

#ad-widget .ad-label {
  font-size: 0.6rem;
  letter-spacing: 0.12em;
  color: var(--muted);
  text-transform: uppercase;
}

#ad-widget .ad-controls {
  display: flex;
  align-items: center;
  gap: 6px;
}

#ad-widget .ad-toggle {
  background: none;
  border: none;
  color: var(--muted);
  cursor: pointer;
  font-size: 0.75rem;
  padding: 2px 5px;
  border-radius: 4px;
  transition: color 0.15s, background 0.15s;
  line-height: 1;
}
#ad-widget .ad-toggle:hover { color: var(--text); background: var(--surface2); }

#ad-widget .ad-grid-wrap {
  background: #0e0e1e;
  border: 1px solid var(--border);
  border-top: 1px solid rgba(255,255,255,0.04);
  border-radius: 0 0 var(--radius) var(--radius);
  padding: 8px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  grid-template-rows: auto auto;
  gap: 6px;
  transition: all 0.3s ease;
}

#ad-widget.collapsed .ad-grid-wrap {
  display: none;
}

/* 첫 번째 카드 2칸 차지 */
.ad-card {
  border-radius: 8px;
  overflow: hidden;
  background: var(--surface2);
  border: 1px solid var(--border);
  cursor: pointer;
  transition: border-color 0.2s;
  position: relative;
}
.ad-card:hover { border-color: rgba(232,255,71,0.3); }
.ad-card.main-card {
  grid-column: 1 / -1;
}
.ad-card.active { border-color: rgba(232,255,71,0.5); }

.ad-card iframe {
  width: 100%;
  aspect-ratio: 16/9;
  display: block;
  border: none;
}

.ad-thumb {
  width: 100%;
  aspect-ratio: 16/9;
  background: #1a1a2e;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}

.ad-play {
  width: 28px; height: 28px;
  background: rgba(232,255,71,0.12);
  border: 1px solid rgba(232,255,71,0.4);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.2s;
}
.ad-play svg { width: 10px; height: 10px; fill: var(--accent); margin-left: 2px; }
.ad-thumb:hover .ad-play { background: rgba(232,255,71,0.25); }

.ad-num {
  position: absolute;
  top: 4px; left: 5px;
  background: var(--accent);
  color: #080810;
  font-size: 0.55rem;
  font-weight: 700;
  padding: 1px 5px;
  border-radius: 3px;
  font-family: 'Bebas Neue', sans-serif;
  letter-spacing: 0.5px;
}

footer {
  text-align: center;
  padding: 2rem 1rem 1.5rem;
  margin-top: 3rem;
  border-top: 1px solid var(--border);
  font-size: 0.68rem;
  color: #2e2e48;
}
footer a { color: #3a3a5a; text-decoration: none; }
footer a:hover { color: var(--muted); }
</style>
</head>
<body>

<header>
  <div class="logo" onclick="resetHome()">CATCH IMAGE</div>
  <div class="header-search">
    <input type="text" id="headerSearch" placeholder="이미지 검색..." />
    <button onclick="doSearch('header')">검색</button>
  </div>
  <div class="source-toggle">
    <button class="src-btn active" id="btn-all"     onclick="setSource('all')">전체</button>
    <button class="src-btn"        id="btn-pexels"  onclick="setSource('pexels')">Pexels</button>
    <button class="src-btn"        id="btn-pixabay" onclick="setSource('pixabay')">Pixabay</button>
  </div>
</header>

<section class="hero" id="heroSection">
  <h1>CATCH<br><span>IMAGE</span></h1>
  <p>Pexels + Pixabay — 수백만 장의 무료 고화질 이미지</p>
  <div class="hero-search">
    <input type="text" id="heroSearch" placeholder="찾고 싶은 이미지를 입력하세요..." autofocus />
    <button onclick="doSearch('hero')">검색</button>
  </div>
  <div class="tags">
    <span class="tag" onclick="quickSearch('nature')">🌿 자연</span>
    <span class="tag" onclick="quickSearch('city night')">🏙️ 도시</span>
    <span class="tag" onclick="quickSearch('ocean')">🌊 바다</span>
    <span class="tag" onclick="quickSearch('mountain')">⛰️ 산</span>
    <span class="tag" onclick="quickSearch('food')">🍜 음식</span>
    <span class="tag" onclick="quickSearch('architecture')">🏛️ 건축</span>
    <span class="tag" onclick="quickSearch('portrait')">👤 인물</span>
    <span class="tag" onclick="quickSearch('abstract')">🎨 추상</span>
    <span class="tag" onclick="quickSearch('technology')">💻 기술</span>
    <span class="tag" onclick="quickSearch('travel')">✈️ 여행</span>
    <span class="tag" onclick="quickSearch('animal')">🦁 동물</span>
    <span class="tag" onclick="quickSearch('flower')">🌸 꽃</span>
  </div>
</section>

<section class="gallery-section">
  <div class="gallery-header">
    <div class="gallery-title-text" id="galleryTitle">인기 이미지</div>
    <div class="gallery-controls">
      <select id="perPage" onchange="reSearch()">
        <option value="15">15장</option>
        <option value="30" selected>30장</option>
        <option value="60">60장</option>
      </select>
    </div>
  </div>
  <div id="gallery" class="gallery"></div>
  <div id="status" class="status"><div class="spinner"></div></div>
  <div id="loadMore" class="load-more" style="display:none;">
    <button onclick="loadMore()">더 보기 →</button>
  </div>
</section>

<!-- 광고 영상 위젯 (좌측 하단 고정) -->
<div id="ad-widget">
  <div class="ad-header">
    <span class="ad-label">광고 영상</span>
    <div class="ad-controls">
      <button class="ad-toggle" id="collapseBtn" onclick="toggleAd()" title="접기">▾</button>
      <button class="ad-toggle" onclick="closeAd()" title="닫기">✕</button>
    </div>
  </div>
  <div class="ad-grid-wrap" id="adGrid">
    <!-- JS로 렌더링 -->
  </div>
</div>

<div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
  <button class="lb-close" onclick="document.getElementById('lightbox').classList.remove('open')">×</button>
  <img id="lightboxImg" src="" alt="" />
  <a id="lbDlBtn" class="lb-dl" href="#">⬇ 다운로드</a>
</div>

<footer>
  Photos by <a href="https://www.pexels.com" target="_blank">Pexels</a> &amp; <a href="https://pixabay.com" target="_blank">Pixabay</a>
</footer>

<script>
const PEXELS_KEY  = 'CyPFyOXxFbr0NMAzwDCrfplwsXdM0fbvm8I466eyhXSz807E85UmBn1t';
const PIXABAY_KEY = '55240646-e066fc8797e32f224e3416303';
const VIDEO_IDS   = ['195446325','195445799','195445533','195352929','195346657'];

let currentQuery  = 'nature';
let currentPage   = 1;
let isLoading     = false;
let currentSource = 'all';
let activeVideoIdx = 0;

/* ── AD WIDGET ─────────────────────────────────── */
function buildAdGrid() {
  const grid = document.getElementById('adGrid');
  grid.innerHTML = '';

  VIDEO_IDS.forEach((id, i) => {
    const card = document.createElement('div');
    card.className = 'ad-card' + (i === 0 ? ' main-card' : '') + (i === activeVideoIdx ? ' active' : '');
    card.id = 'adcard-' + i;

    if (i === activeVideoIdx) {
      card.innerHTML = '<iframe src="https://vod.sooplive.com/player/' + id +
        '/embed?showChat=false&autoPlay=true&mutePlay=true" allowfullscreen allow="clipboard-write; web-share; autoplay;"></iframe>';
    } else {
      card.innerHTML =
        '<div class="ad-thumb" onclick="switchVideo(' + i + ')">' +
          '<span class="ad-num">0' + (i+1) + '</span>' +
          '<div class="ad-play"><svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg></div>' +
        '</div>';
    }
    grid.appendChild(card);
  });
}

function switchVideo(idx) {
  activeVideoIdx = idx;
  buildAdGrid();
}

function toggleAd() {
  const w = document.getElementById('ad-widget');
  const btn = document.getElementById('collapseBtn');
  w.classList.toggle('collapsed');
  btn.textContent = w.classList.contains('collapsed') ? '▸' : '▾';
}

function closeAd() {
  document.getElementById('ad-widget').style.display = 'none';
}

/* ── SOURCE TOGGLE ──────────────────────────────── */
function setSource(src) {
  currentSource = src;
  ['all','pexels','pixabay'].forEach(s => {
    document.getElementById('btn-' + s).className = 'src-btn' + (s === src ? ' active' : '');
  });
  reSearch();
}

/* ── SEARCH ─────────────────────────────────────── */
document.getElementById('heroSearch').addEventListener('keydown',   e => { if (e.key === 'Enter') doSearch('hero'); });
document.getElementById('headerSearch').addEventListener('keydown', e => { if (e.key === 'Enter') doSearch('header'); });

function quickSearch(q) {
  document.getElementById('heroSearch').value   = q;
  document.getElementById('headerSearch').value = q;
  startSearch(q);
}

function doSearch(from) {
  const q = (from === 'header'
    ? document.getElementById('headerSearch')
    : document.getElementById('heroSearch')).value.trim();
  if (!q) return;
  document.getElementById('heroSearch').value   = q;
  document.getElementById('headerSearch').value = q;
  startSearch(q);
}

function reSearch() { if (currentQuery) startSearch(currentQuery); }

function resetHome() {
  document.getElementById('heroSearch').value   = '';
  document.getElementById('headerSearch').value = '';
  startSearch('nature');
}

function startSearch(q) {
  currentQuery = q;
  currentPage  = 1;
  document.getElementById('gallery').innerHTML       = '';
  document.getElementById('loadMore').style.display  = 'none';
  document.getElementById('galleryTitle').textContent =
    q === 'nature' ? '인기 이미지' : '"' + q + '" 검색 결과';
  fetchAll(q, 1, true);
  window.scrollTo({ top: document.querySelector('.gallery-section').offsetTop - 80, behavior: 'smooth' });
}

function loadMore() { currentPage++; fetchAll(currentQuery, currentPage, false); }

/* ── FETCH ──────────────────────────────────────── */
async function fetchAll(query, page, clear) {
  if (isLoading) return;
  isLoading = true;
  const perPage   = parseInt(document.getElementById('perPage').value);
  const status    = document.getElementById('status');
  const loadMoreEl = document.getElementById('loadMore');

  if (clear) {
    status.innerHTML  = '<div class="spinner"></div>';
    status.className  = 'status';
    status.style.display = 'block';
  } else {
    loadMoreEl.style.display = 'none';
    const sp = document.createElement('div');
    sp.className = 'spinner'; sp.id = 'moreSpinner';
    document.querySelector('.gallery-section').appendChild(sp);
  }

  try {
    let photos = [], hasMore = false;

    if (currentSource === 'pexels') {
      const r = await fetchPexels(query, page, perPage);
      photos = r.photos; hasMore = r.hasMore;
    } else if (currentSource === 'pixabay') {
      const r = await fetchPixabay(query, page, perPage);
      photos = r.photos; hasMore = r.hasMore;
    } else {
      const half = Math.floor(perPage / 2);
      const [px, pb] = await Promise.all([fetchPexels(query, page, half), fetchPixabay(query, page, half)]);
      const maxLen = Math.max(px.photos.length, pb.photos.length);
      for (let i = 0; i < maxLen; i++) {
        if (i < px.photos.length) photos.push(px.photos[i]);
        if (i < pb.photos.length) photos.push(pb.photos[i]);
      }
      hasMore = px.hasMore || pb.hasMore;
    }

    document.getElementById('moreSpinner')?.remove();

    if (photos.length === 0) {
      status.textContent   = '"' + query + '" 검색 결과가 없습니다.';
      status.style.display = 'block';
      isLoading = false; return;
    }

    status.style.display = 'none';
    renderPhotos(photos);
    if (hasMore) loadMoreEl.style.display = 'flex';

  } catch(err) {
    status.textContent   = '❌ ' + err.message;
    status.className     = 'status error';
    status.style.display = 'block';
    document.getElementById('moreSpinner')?.remove();
  }

  isLoading = false;
}

async function fetchPexels(query, page, perPage) {
  const res = await fetch(
    'https://api.pexels.com/v1/search?query=' + encodeURIComponent(query) + '&per_page=' + perPage + '&page=' + page,
    { headers: { Authorization: PEXELS_KEY } }
  );
  if (!res.ok) throw new Error('Pexels 오류: ' + res.status);
  const data = await res.json();
  return {
    photos: (data.photos||[]).map(p => ({
      source: 'pexels', thumb: p.src.large, original: p.src.original,
      download: p.src.original, photographer: p.photographer, alt: p.alt||query
    })),
    hasMore: data.total_results > page * perPage
  };
}

async function fetchPixabay(query, page, perPage) {
  const res = await fetch(
    'https://pixabay.com/api/?key=' + PIXABAY_KEY +
    '&q=' + encodeURIComponent(query) + '&per_page=' + perPage + '&page=' + page +
    '&image_type=photo&safesearch=true'
  );
  if (!res.ok) throw new Error('Pixabay 오류: ' + res.status);
  const data = await res.json();
  return {
    photos: (data.hits||[]).map(p => ({
      source: 'pixabay', thumb: p.webformatURL, original: p.largeImageURL,
      download: p.largeImageURL, photographer: p.user, alt: query
    })),
    hasMore: data.totalHits > page * perPage
  };
}

/* ── RENDER ─────────────────────────────────────── */
function renderPhotos(photos) {
  const gallery = document.getElementById('gallery');
  photos.forEach(photo => {
    const card     = document.createElement('div');
    card.className = 'photo-card';
    const safeAlt  = (photo.alt||'').replace(/"/g,'').replace(/'/g,'');
    const badge    = photo.source === 'pexels' ? 'badge-pexels' : 'badge-pixabay';
    const label    = photo.source === 'pexels' ? 'Pexels' : 'Pixabay';

    card.innerHTML =
      '<img src="' + photo.thumb + '" alt="' + safeAlt + '" loading="lazy">' +
      '<span class="source-badge ' + badge + '">' + label + '</span>' +
      '<div class="photo-overlay">' +
        '<span class="photographer">📷 ' + photo.photographer + '</span>' +
        '<div class="overlay-btns">' +
          '<button class="view-btn">크게 보기</button>' +
          '<button class="dl-btn">⬇ 다운로드</button>' +
        '</div>' +
      '</div>';

    card.querySelector('img').addEventListener('click', () => openLightbox(photo.original, safeAlt, photo.download));
    card.querySelector('.view-btn').addEventListener('click', () => openLightbox(photo.original, safeAlt, photo.download));
    card.querySelector('.dl-btn').addEventListener('click', () => directDownload(photo.download, safeAlt));
    gallery.appendChild(card);
  });
}

/* ── DOWNLOAD ───────────────────────────────────── */
async function directDownload(url, filename) {
  try {
    const res  = await fetch(url);
    const blob = await res.blob();
    const a    = document.createElement('a');
    a.href     = URL.createObjectURL(blob);
    a.download = (filename || 'catch-image') + '.jpg';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(a.href), 5000);
  } catch {
    const a    = document.createElement('a');
    a.href     = url; a.download = (filename||'catch-image') + '.jpg'; a.target = '_blank';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
  }
}

/* ── LIGHTBOX ───────────────────────────────────── */
function openLightbox(src, alt, dlUrl) {
  document.getElementById('lightboxImg').src = src;
  document.getElementById('lightboxImg').alt = alt;
  document.getElementById('lbDlBtn').onclick = e => { e.preventDefault(); directDownload(dlUrl, alt); };
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox(e) {
  if (e.target === document.getElementById('lightbox'))
    document.getElementById('lightbox').classList.remove('open');
}
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') document.getElementById('lightbox').classList.remove('open');
});

/* ── INIT ───────────────────────────────────────── */
buildAdGrid();
fetchAll('nature', 1, true);
